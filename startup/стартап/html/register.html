<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сдать комнату</title>


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff7a5c, #ffb199);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* карточка */
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    text-align: center;
}

/* заголовок */
h2 {
    margin-bottom: 25px;
}

/* поля */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
}

/* кнопка */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #ff7a5c;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff5c3d;
    transform: translateY(-2px);
}

/* сообщение */
.success {
    margin-top: 15px;
    color: green;
    display: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Сдать комнату</h2>

    <input id="address" placeholder="Адрес">
    <input id="price" placeholder="Цена в месяц">
    <textarea id="desc" placeholder="Описание"></textarea>

    <button onclick="send()">Отправить заявку</button>

    <div class="success" id="msg">
        ✅ Заявка отправлена!
    </div>
</div>

<script>
async function send() {

    const address = document.getElementById("address").value;
    const price = document.getElementById("price").value;
    const desc = document.getElementById("desc").value;

    await fetch("/rent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address, price, desc })
    });

    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
